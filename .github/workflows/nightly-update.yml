name: Nightly Update & Health Check

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "nightly-update"
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./web
        run: npm ci --prefer-offline
        
      - name: Run import script
        run: npm run import-skills || echo "Import script not found, skipping..."
        
      - name: Build verification
        working-directory: ./web
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SITE_URL: ${{ github.event.repository.html_url }}
        
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected, will deploy"
          fi

  deploy-if-changed:
    needs: health-check
    if: needs.health-check.outputs.changes == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Deployment Summary
        if: success()
        run: |
          echo "🌙 Nightly Update Deployment"
          echo "✅ Deployment successful!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Time: $(date)"
